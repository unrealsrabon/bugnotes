<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BugNotes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<style>
/* =========================================================
   Design tokens
   ========================================================= */
:root{
  --bg: #f4f3ee;
  --surface: #ebe9df;
  --surface-2: #e2dfd2;
  --border: #d9d5c6;
  --border-strong: #c7c2ae;
  --ink: #2a2a24;
  --ink-muted: #6f6c5e;
  --ink-faint: #9b9787;
  --accent: #3f6b52;
  --accent-ink: #ffffff;
  --accent-soft: #e2ebe3;
  --accent-soft-border: #c3d6c8;
  --danger: #a8493c;
  --danger-soft: #f3e3e0;
  --warn: #a97c2f;
  --warn-soft: #f2ead9;
  --radius-sm: 4px;
  --radius: 7px;
  --radius-lg: 10px;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --sidebar-w: 280px;
}

*{ box-sizing: border-box; }
html,body{ height:100%; }
body{
  margin:0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  overflow:hidden;
  -webkit-font-smoothing: antialiased;
}
button{ font-family: inherit; cursor:pointer; }
input, textarea{ font-family: inherit; }
::selection{ background: var(--accent-soft-border); }

svg{ display:block; flex-shrink:0; }

/* =========================================================
   App shell
   ========================================================= */
#app{
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* ---------- Header ---------- */
header{
  height:52px;
  min-height:52px;
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 16px;
  background: var(--bg);
  border-bottom: 1px solid transparent;
  z-index: 20;
}
.icon-btn{
  width:34px; height:34px;
  display:flex; align-items:center; justify-content:center;
  background:transparent;
  border:1px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--ink-muted);
  transition: background .12s ease, color .12s ease, border-color .12s ease;
}
.icon-btn:hover{
  background: var(--surface-2);
  color: var(--ink);
  border-color: var(--border);
}
.icon-btn svg{ width:18px; height:18px; }

.header-path{
  display:flex;
  align-items:baseline;
  gap:8px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--ink-faint);
  overflow:hidden;
  white-space:nowrap;
  flex:1;
  min-width:0;
}
.header-path .sep{ color: var(--border-strong); }
.header-path .note-name{
  color: var(--ink);
  font-weight:500;
  overflow:hidden;
  text-overflow:ellipsis;
}
.dirty-dot{
  width:6px; height:6px; border-radius:50%;
  background: var(--warn);
  flex-shrink:0;
  display:none;
}
.dirty-dot.show{ display:inline-block; }

.header-actions{ display:flex; align-items:center; gap:10px; }

.sync-pill{
  display:flex; align-items:center; gap:6px;
  font-size:12px;
  color: var(--ink-muted);
  padding:5px 10px;
  border-radius: 999px;
  border:1px solid var(--border);
  background: var(--surface);
  white-space:nowrap;
}
.sync-pill .dot{ width:7px; height:7px; border-radius:50%; background: var(--ink-faint); }
.sync-pill.online .dot{ background: var(--accent); }
.sync-pill.offline .dot{ background: var(--ink-faint); }
.sync-pill.error .dot{ background: var(--danger); }
.sync-pill.busy .dot{ background: var(--warn); animation: pulse 1s infinite ease-in-out; }
@keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.25;} }

.btn{
  display:flex; align-items:center; gap:7px;
  font-size:13px; font-weight:600;
  padding:7px 13px;
  border-radius: var(--radius-sm);
  border:1px solid var(--border-strong);
  background: var(--surface);
  color: var(--ink);
  transition: background .12s ease, transform .04s ease, border-color .12s ease;
}
.btn:hover{ background: var(--surface-2); }
.btn:active{ transform: translateY(1px); }
.btn svg{ width:15px; height:15px; }
.btn-primary{
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-ink);
}
.btn-primary:hover{ background:#365e46; }
.btn-primary:disabled{ opacity:.5; cursor:default; }
.btn-primary:disabled:hover{ background: var(--accent); }
.btn-ghost{
  background:transparent;
  border-color:transparent;
  color: var(--ink-muted);
}
.btn-ghost:hover{ background: var(--surface-2); color: var(--ink); }
.btn-danger-ghost{
  background:transparent;
  border-color:transparent;
  color: var(--danger);
}
.btn-danger-ghost:hover{ background: var(--danger-soft); }
.btn-block{ width:100%; justify-content:center; }
.btn-sm{ padding:6px 10px; font-size:12px; }

.gh-star-btn{
  display:flex; align-items:center; gap:7px;
  font-size:12.5px; font-weight:600;
  padding:7px 12px;
  border-radius: var(--radius-sm);
  border:1px solid var(--border-strong);
  background: linear-gradient(180deg, #f3efe6 0%, #ebe5d8 100%);
  color: #4b463b;
  text-decoration:none;
  white-space:nowrap;
  transition: background .12s ease, transform .04s ease, border-color .12s ease, color .12s ease;
}
.gh-star-btn:hover{
  background: linear-gradient(180deg, #ede7db 0%, #e5decf 100%);
  border-color: #bfb8aa;
  color: #2f2a22;
}
.gh-star-btn:active{ transform: translateY(1px); }
.gh-star-btn svg{ width:14px; height:14px; color: #9a762f; }

/* ---------- Layout body ---------- */
.layout{
  flex:1;
  display:flex;
  min-height:0;
}

/* ---------- Sidebar ---------- */
#sidebar{
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--surface);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  transition: margin-left .18s ease, opacity .15s ease;
}
#sidebar.collapsed{
  margin-left: calc(var(--sidebar-w) * -1);
  opacity:0;
  pointer-events:none;
}

.sidebar-top{
  padding:14px 14px 10px 14px;
  display:flex; flex-direction:column; gap:10px;
}
.search-row{
  display:flex; align-items:center; gap:8px;
  background: var(--bg);
  border:1px solid var(--border);
  border-radius: var(--radius-sm);
  padding:6px 9px;
}
.search-row svg{ width:14px; height:14px; color: var(--ink-faint); }
.search-row input{
  border:none; outline:none; background:transparent;
  font-size:13px; color: var(--ink); flex:1; min-width:0;
}
.search-row input::placeholder{ color: var(--ink-faint); }

.note-list{
  flex:1;
  overflow-y:auto;
  padding: 4px 8px 8px 8px;
  display:flex; flex-direction:column; gap:2px;
}
.note-list::-webkit-scrollbar{ width:8px; }
.note-list::-webkit-scrollbar-thumb{ background: var(--border-strong); border-radius:8px; }

.note-item{
  display:flex; align-items:center; gap:9px;
  padding:8px 9px;
  border-radius: var(--radius-sm);
  cursor:pointer;
  border:1px solid transparent;
  position:relative;
}
.note-item:hover{ background: var(--surface-2); }
.note-item.active{
  background: var(--accent-soft);
  border-color: var(--accent-soft-border);
}
.note-item .status-dot{
  width:6px; height:6px; border-radius:50%;
  background: var(--ink-faint);
  flex-shrink:0;
}
.note-item .status-dot.synced{ background: var(--accent); }
.note-item .status-dot.local{ background: var(--warn); }
.note-item .meta{ flex:1; min-width:0; }
.note-item .title{
  font-size:13px; font-weight:500; color: var(--ink);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.note-item.active .title{ color: #1f3a2b; }
.note-item .sub{
  font-size:11px; color: var(--ink-faint);
  font-family: var(--font-mono);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-top:1px;
}
.note-item .del-btn{
  opacity:0; width:22px; height:22px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  border-radius: var(--radius-sm);
  color: var(--ink-faint);
}
.note-item:hover .del-btn{ opacity:1; }
.note-item .del-btn:hover{ background: var(--danger-soft); color: var(--danger); }
.note-item .del-btn svg{ width:14px; height:14px; }

.empty-list{
  padding: 22px 14px;
  text-align:center;
  color: var(--ink-faint);
  font-size:12.5px;
  line-height:1.6;
}

/* ---------- Sidebar bottom: local backup panel ---------- */
.sidebar-bottom{
  border-top:1px solid var(--border);
  padding: 10px;
  flex-shrink:0;
}
.gh-toggle{
  width:100%;
  display:flex; align-items:center; gap:9px;
  padding:8px 9px;
  border-radius: var(--radius-sm);
  background:transparent;
  border:1px solid transparent;
  color: var(--ink-muted);
  font-size:12.5px;
  font-weight:600;
}
.gh-toggle:hover{ background: var(--surface-2); }
.gh-toggle svg{ width:16px; height:16px; }
.gh-toggle .gh-status-dot{
  width:6px; height:6px; border-radius:50%;
  background: var(--ink-faint); margin-left:auto;
}
.gh-toggle .gh-status-dot.on{ background: var(--accent); }
.gh-toggle .chev{ width:13px; height:13px; margin-left:6px; transition: transform .15s ease; color: var(--ink-faint); }
.gh-toggle.open .chev{ transform: rotate(180deg); }

#githubPanel{
  overflow:hidden;
  max-height:0;
  transition: max-height .2s ease;
}
#githubPanel.open{ max-height:520px; }
.gh-form{
  padding:12px 8px 4px 8px;
  display:flex; flex-direction:column; gap:10px;
}
.field{ display:flex; flex-direction:column; gap:4px; }
.field label{
  font-size:11px; font-weight:600; letter-spacing:.02em;
  color: var(--ink-muted); text-transform:uppercase;
}
.field input{
  border:1px solid var(--border);
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding:7px 9px;
  font-size:12.5px;
  color: var(--ink);
  outline:none;
}
.field input:focus{ border-color: var(--accent); }
.field-hint{ font-size:11px; color: var(--ink-faint); line-height:1.5; }
.field-hint a{ color: var(--accent); }
.gh-actions{ display:flex; gap:8px; margin-top:2px; }
.gh-msg{
  font-size:11.5px; line-height:1.5;
  padding:7px 9px;
  border-radius: var(--radius-sm);
  display:none;
}
.gh-msg.show{ display:block; }
.gh-msg.ok{ background: var(--accent-soft); color:#2a4d38; }
.gh-msg.err{ background: var(--danger-soft); color: var(--danger); }

/* ---------- Workspace ---------- */
#workspace{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
  padding: 22px 0 0 0;
  overflow:hidden;
}
.editor-shell{
  flex:1;
  width:100%;
  max-width: min(1180px, 96%);
  margin:0 auto;
  padding: 0 clamp(20px, 4.5vw, 64px);
  display:flex;
  flex-direction:column;
  min-height:0;
}
.title-input{
  border:none; outline:none; background:transparent;
  font-family: var(--font-sans);
  font-size: 26px;
  font-weight:700;
  color: var(--ink);
  padding-bottom: 12px;
  width:100%;
  flex-shrink:0;
}
.title-input::placeholder{ color: var(--ink-faint); }

.editor-footer{
  flex-shrink:0;
  display:flex; justify-content:space-between; align-items:center;
  padding: 8px clamp(20px, 4.5vw, 64px) 14px clamp(20px, 4.5vw, 64px);
  font-family: var(--font-mono);
  font-size:11.5px;
  color: var(--ink-faint);
}
.editor-footer .fname{ opacity:.85; }

.empty-state{
  flex:1;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px;
  color: var(--ink-faint);
  text-align:center;
  padding: 0 30px;
}
.empty-state svg{ width:38px; height:38px; opacity:.5; }
.empty-state h2{ font-size:16px; color: var(--ink-muted); margin:0; font-weight:600; }
.empty-state p{ font-size:13px; margin:0; max-width:340px; line-height:1.6; }

/* =========================================================
   Toolbar (drives the CodeMirror instance directly)
   ========================================================= */
.md-toolbar{
  flex-shrink:0;
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  gap:2px;
  padding: 4px 2px 12px 2px;
  border-bottom:1px solid var(--border);
  margin-bottom:14px;
}
.md-toolbar .tb-sep{
  width:1px; align-self:stretch;
  background: var(--border);
  margin: 2px 6px;
}
.tb-btn{
  width:30px; height:30px;
  display:flex; align-items:center; justify-content:center;
  background:transparent;
  border:1px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--ink-muted);
}
.tb-btn:hover{
  background: var(--surface-2);
  border-color: var(--border);
  color: var(--ink);
}
.tb-btn:active{ transform: translateY(1px); }
.tb-btn svg{ width:16px; height:16px; }
.tb-btn text{ font-size:13px; }

/* =========================================================
   CodeMirror theming — background must stay exactly #f4f3ee
   ========================================================= */
.cm-wrap{
  flex:1;
  min-height:0;
  display:flex;
}
.CodeMirror{
  flex:1;
  background: #f4f3ee !important;
  color: var(--ink);
  font-family: var(--font-mono);
  font-size: 15px;
  line-height:1.7;
  height:100%;
}
.CodeMirror-gutters{
  background: #f4f3ee !important;
  border-right: 1px solid var(--border);
}
.CodeMirror-linenumber{
  color: var(--ink-faint);
  font-family: var(--font-mono);
  font-size:12px;
  padding: 0 10px 0 4px;
}
.CodeMirror-cursor{ border-left: 1.5px solid var(--accent) !important; }
.CodeMirror-selected{ background: var(--accent-soft) !important; }
.CodeMirror-activeline-background{ background: var(--surface-2) !important; }
.CodeMirror-focused .CodeMirror-activeline-background{ background: var(--surface-2) !important; }
.CodeMirror pre.CodeMirror-line{ padding: 0 2px; }
.CodeMirror-placeholder{ color: var(--ink-faint) !important; opacity:1 !important; }

.cm-header{ color:#233c2c; font-weight:700; font-family: var(--font-sans); }
.cm-header-1{ font-size:1.7em; }
.cm-header-2{ font-size:1.4em; }
.cm-header-3{ font-size:1.2em; }
.cm-header-4, .cm-header-5, .cm-header-6{ font-size:1.05em; }
.cm-strong{ color: var(--ink); font-weight:700; }
.cm-em{ color: var(--ink); font-style:italic; }
.cm-strikethrough{ text-decoration: line-through; color: var(--ink-faint); }
.cm-quote{ color: var(--ink-muted); font-style:italic; }
.cm-link{ color: var(--accent); }
.cm-url{ color: var(--ink-faint); }
.cm-comment{
  font-family: var(--font-mono);
  background: var(--surface-2);
  border-radius:3px;
  color:#4a4536;
}
.cm-variable-2{ color:#4a6b52; }
.cm-formatting{ color: var(--ink-faint); }
.CodeMirror-matchingbracket{ color: var(--accent) !important; }

/* Scrollbars, generic */
::-webkit-scrollbar{ width:10px; height:10px; }
::-webkit-scrollbar-thumb{ background: var(--border-strong); border-radius:8px; }
::-webkit-scrollbar-track{ background:transparent; }

/* Toast */
#toast{
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(8px);
  background:#232219; color:#f4f3ee;
  font-size:12.5px; font-family: var(--font-mono);
  padding:9px 16px; border-radius: var(--radius);
  box-shadow: 0 8px 24px rgba(0,0,0,.18);
  opacity:0; pointer-events:none;
  transition: opacity .18s ease, transform .18s ease;
  z-index:100;
  max-width: 60vw;
}
#toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
#toast.err{ background:#4a2420; }

@media (max-width: 760px){
  :root{ --sidebar-w: 240px; }
  #sidebar{ position:fixed; top:52px; bottom:0; left:0; z-index:30; box-shadow: 8px 0 24px rgba(0,0,0,.12); }
  .editor-shell{ max-width: 100%; }
}
</style>

</head>
<body>

<div id="app">

  <header>
    <button class="icon-btn" id="sidebarToggle" title="Toggle sidebar" aria-label="Toggle sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="16" rx="2"></rect>
        <line x1="9.5" y1="4" x2="9.5" y2="20"></line>
      </svg>
    </button>

    <div class="header-path">
      <span>~/notes</span>
      <span class="sep">/</span>
      <span class="note-name" id="headerNoteName">no note open</span>
      <span class="dirty-dot" id="dirtyDot" title="Unsaved changes"></span>
    </div>

    <div class="header-actions">
      <div class="sync-pill offline" id="syncPill">
        <span class="dot"></span>
        <span id="syncPillText">local only</span>
      </div>
      <a class="gh-star-btn" href="https://github.com/unrealsrabon/bugnotes" target="_blank" rel="noopener noreferrer" aria-label="Star BugNotes on GitHub" title="Star BugNotes on GitHub">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.75.75 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Zm0 2.445L6.615 5.5a.75.75 0 0 1-.564.41l-3.097.45 2.24 2.184a.75.75 0 0 1 .216.664l-.528 3.084 2.769-1.456a.75.75 0 0 1 .698 0l2.77 1.456-.53-3.084a.75.75 0 0 1 .216-.664l2.24-2.183-3.096-.45a.75.75 0 0 1-.564-.41L8 2.695Z"></path>
        </svg>
        <span>Star on GitHub</span>
      </a>
      <button class="btn" id="exportNoteBtn" title="Export current note (.md)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        <span>Export</span>
      </button>
      <button class="btn btn-primary" id="saveBtn" title="Save (Ctrl/Cmd+S)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path>
          <path d="M17 21v-8H7v8"></path>
          <path d="M7 3v5h8"></path>
        </svg>
        <span>Save</span>
      </button>

    </div>
  </header>

  <div class="layout">

    <aside id="sidebar">
      <div class="sidebar-top">
        <button class="btn btn-primary btn-block" id="newNoteBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          <span>New note</span>
        </button>
        <div class="search-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="searchInput" placeholder="Filter notes...">
        </div>
      </div>

      <div class="note-list" id="noteList">
        <!-- rendered by JS -->
      </div>

      <div class="sidebar-bottom">
        <button class="btn btn-primary btn-block" id="importNoteBtn" title="Import a Markdown file as a new note">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          <span>Import Note (.md)</span>
        </button>
        <input type="file" id="importFileInput" accept=".md,.txt" style="display:none;">
      </div>
    </aside>


    <main id="workspace">
      <!-- editor / empty state injected by JS -->
    </main>

  </div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>
<script>
(function(){
"use strict";

/* =========================================================
   Constants & small utilities
   ========================================================= */
const LS_SIDEBAR = "fieldnotes.sidebar.collapsed";
const AUTOSAVE_DELAY = 400; // ms debounce before writing a change to IndexedDB

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));

function uid(){
  return Math.random().toString(36).slice(2, 10);
}

function slugify(str){
  return (str || "untitled")
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9\s-]/g, "")
    .replace(/\s+/g, "-")
    .replace(/-+/g, "-")
    .slice(0, 48) || "untitled";
}

function extractTitle(content){
  if(!content) return "Untitled";
  const lines = content.split("\n");
  for(const line of lines){
    const trimmed = line.trim();
    if(trimmed.startsWith("#")){
      const t = trimmed.replace(/^#+\s*/, "").trim();
      if(t) return t;
    }
  }
  const firstNonEmpty = lines.find(l => l.trim().length > 0);
  return firstNonEmpty ? firstNonEmpty.trim().slice(0, 60) : "Untitled";
}

function fmtTime(ts){
  if(!ts) return "";
  const d = new Date(ts);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if(sameDay){
    return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  }
  return d.toLocaleDateString([], {month:"short", day:"numeric"});
}

let toastTimer = null;
function toast(msg, isErr){
  const el = $("#toast");
  el.textContent = msg;
  el.classList.toggle("err", !!isErr);
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 3200);
}

/* =========================================================
   IndexedDB storage layer
   All note data lives here — nothing ever leaves the browser.
   ========================================================= */
const DB_NAME = "fieldnotes-db";
const DB_VERSION = 1;
const STORE_NOTES = "notes";

let dbPromise = null;

function openDB(){
  if(dbPromise) return dbPromise;
  dbPromise = new Promise((resolve, reject) => {
    if(!("indexedDB" in window)){
      reject(new Error("IndexedDB is not available in this browser."));
      return;
    }
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if(!db.objectStoreNames.contains(STORE_NOTES)){
        const store = db.createObjectStore(STORE_NOTES, {keyPath: "id"});
        store.createIndex("updatedAt", "updatedAt", {unique: false});
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error("Failed to open local database."));
  });
  return dbPromise;
}

async function dbGetAllNotes(){
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NOTES, "readonly");
    const req = tx.objectStore(STORE_NOTES).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error || new Error("Failed to read notes."));
  });
}

async function dbPutNote(record){
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NOTES, "readwrite");
    tx.objectStore(STORE_NOTES).put(record);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error || new Error("Failed to save note."));
  });
}

async function dbDeleteNote(id){
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NOTES, "readwrite");
    tx.objectStore(STORE_NOTES).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error || new Error("Failed to delete note."));
  });
}

/* =========================================================
   State
   ========================================================= */
const state = {
  notes: [],                 // [{id, title, titleLocked, content, dirty, updatedAt}]
  currentId: null,
  cm: null,                  // CodeMirror instance
  suppressChange: false,
  sidebarCollapsed: localStorage.getItem(LS_SIDEBAR) === "1",
  filter: "",
  saveTimers: Object.create(null), // id -> timeout handle, for debounced autosave
};

function toDbRecord(note){
  return {
    id: note.id,
    title: note.title,
    titleLocked: !!note.titleLocked,
    content: note.content,
    updatedAt: note.updatedAt,
  };
}

function getCurrentNote(){
  return state.notes.find(n => n.id === state.currentId) || null;
}

/* Dynamic filename display — derived live from the note's current title
   rather than a fixed value, so it always reflects what's being typed. */
function displaySlugName(note){
  if(!note) return null;
  return `${slugify(note.title || "untitled")}.md`;
}

/* =========================================================
   Sync / status pill (now reflects local IndexedDB autosave state)
   ========================================================= */
function setSyncPill(mode, text){
  const pill = $("#syncPill");
  pill.className = "sync-pill " + mode;
  $("#syncPillText").textContent = text;
}
function restoreSyncPillIdle(){
  setSyncPill("online", "saved on device");
}

/* =========================================================
   Note list rendering
   ========================================================= */
function visibleNotes(){
  const q = state.filter.trim().toLowerCase();
  const sorted = [...state.notes].sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));
  if(!q) return sorted;
  return sorted.filter(n =>
    (n.title||"").toLowerCase().includes(q) ||
    displaySlugName(n).toLowerCase().includes(q)
  );
}

function renderNoteList(){
  const list = $("#noteList");
  const notes = visibleNotes();
  list.innerHTML = "";

  if(notes.length === 0){
    const empty = document.createElement("div");
    empty.className = "empty-list";
    empty.textContent = state.notes.length === 0
      ? "No notes yet. Start a new one — it saves instantly to this browser's local database."
      : "No notes match your filter.";
    list.appendChild(empty);
    return;
  }

  for(const note of notes){
    const item = document.createElement("div");
    item.className = "note-item" + (note.id === state.currentId ? " active" : "");
    item.dataset.id = note.id;

    const dot = document.createElement("span");
    dot.className = "status-dot " + (note.dirty ? "local" : "synced");

    const meta = document.createElement("div");
    meta.className = "meta";
    const title = document.createElement("div");
    title.className = "title";
    title.textContent = note.title || "Untitled";
    const sub = document.createElement("div");
    sub.className = "sub";
    sub.textContent = (note.dirty ? "saving… · " : "") + fmtTime(note.updatedAt);
    meta.appendChild(title);
    meta.appendChild(sub);

    const del = document.createElement("button");
    del.className = "del-btn";
    del.title = "Delete note";
    del.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>`;
    del.addEventListener("click", (e) => {
      e.stopPropagation();
      deleteNote(note.id);
    });

    item.appendChild(dot);
    item.appendChild(meta);
    item.appendChild(del);
    item.addEventListener("click", () => selectNote(note.id));
    list.appendChild(item);
  }
}

/* =========================================================
   Toolbar icons (inline SVG only) + actions wired to CodeMirror
   ========================================================= */
const TB_ICON = {
  bold: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h7a3.5 3.5 0 0 1 0 7H6z"></path><path d="M6 11h8a3.5 3.5 0 0 1 0 7H6z"></path></svg>`,
  italic: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"></line><line x1="14" y1="20" x2="5" y2="20"></line><line x1="15" y1="4" x2="9" y2="20"></line></svg>`,
  heading: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4v16"></path><path d="M18 4v16"></path><path d="M6 12h12"></path></svg>`,
  quote: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21c3 0 6-1.3 6-7V5H3v9h5c0 3-1.7 5-5 5"></path><path d="M13 21c3 0 6-1.3 6-7V5h-6v9h5c0 3-1.7 5-5 5"></path></svg>`,
  code: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 6 2 12 8 18"></polyline><polyline points="16 6 22 12 16 18"></polyline></svg>`,
  codeblock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="m6 9 3 3-3 3"></path><line x1="12" y1="15" x2="16" y2="15"></line></svg>`,
  ul: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="9" y1="6" x2="21" y2="6"></line><line x1="9" y1="12" x2="21" y2="12"></line><line x1="9" y1="18" x2="21" y2="18"></line><circle cx="4" cy="6" r="1.4" fill="currentColor" stroke="none"></circle><circle cx="4" cy="12" r="1.4" fill="currentColor" stroke="none"></circle><circle cx="4" cy="18" r="1.4" fill="currentColor" stroke="none"></circle></svg>`,
  ol: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="6" x2="21" y2="6"></line><line x1="10" y1="12" x2="21" y2="12"></line><line x1="10" y1="18" x2="21" y2="18"></line><text x="2" y="9" font-size="7" fill="currentColor" stroke="none" font-family="inherit">1</text><text x="2" y="15" font-size="7" fill="currentColor" stroke="none" font-family="inherit">2</text><text x="2" y="21" font-size="7" fill="currentColor" stroke="none" font-family="inherit">3</text></svg>`,
  link: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>`,
  image: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><path d="m21 15-5-5L5 21"></path></svg>`,
  table: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></svg>`,
  hr: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"></line></svg>`,
  guide: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M9.5 9a2.5 2.5 0 0 1 4.9.8c0 1.7-2.4 2-2.4 3.7"></path><circle cx="12" cy="17.2" r="0.4" fill="currentColor"></circle></svg>`,
};

function cmWrapSelection(before, after){
  const cm = state.cm;
  after = (after === undefined) ? before : after;
  const selection = cm.getSelection();
  if(selection){
    cm.replaceSelection(before + selection + after, "around");
  }else{
    const cursor = cm.getCursor();
    cm.replaceSelection(before + after);
    cm.setCursor({line: cursor.line, ch: cursor.ch + before.length});
  }
  cm.focus();
}

function cmToggleLinePrefix(prefix){
  const cm = state.cm;
  const cursor = cm.getCursor();
  const line = cm.getLine(cursor.line);
  const from = {line: cursor.line, ch: 0};
  const to = {line: cursor.line, ch: line.length};
  if(line.startsWith(prefix)){
    cm.replaceRange(line.slice(prefix.length), from, to);
  }else{
    cm.replaceRange(prefix + line, from, to);
  }
  cm.focus();
}

function cmToggleHeading(){
  const cm = state.cm;
  const cursor = cm.getCursor();
  const line = cm.getLine(cursor.line);
  const match = line.match(/^(#{1,6})\s?/);
  const from = {line: cursor.line, ch: 0};
  const to = {line: cursor.line, ch: line.length};
  const stripped = line.replace(/^#{1,6}\s?/, "");
  if(!match){
    cm.replaceRange("# " + stripped, from, to);
  }else if(match[1].length < 3){
    cm.replaceRange("#".repeat(match[1].length + 1) + " " + stripped, from, to);
  }else{
    cm.replaceRange(stripped, from, to);
  }
  cm.focus();
}

function cmInlineCode(){ cmWrapSelection("`", "`"); }

function cmCodeBlock(){
  const cm = state.cm;
  const selection = cm.getSelection();
  if(selection){
    cm.replaceSelection("```\n" + selection + "\n```", "around");
  }else{
    const cursor = cm.getCursor();
    cm.replaceSelection("```\n\n```");
    cm.setCursor({line: cursor.line + 1, ch: 0});
  }
  cm.focus();
}

function cmOrderedList(){
  const cm = state.cm;
  const cursor = cm.getCursor();
  const line = cm.getLine(cursor.line);
  const from = {line: cursor.line, ch: 0};
  const to = {line: cursor.line, ch: line.length};
  if(/^\d+\.\s/.test(line)){
    cm.replaceRange(line.replace(/^\d+\.\s/, ""), from, to);
  }else{
    cm.replaceRange("1. " + line, from, to);
  }
  cm.focus();
}

function cmLink(){
  const cm = state.cm;
  const selection = cm.getSelection();
  const label = selection || "link text";
  cm.replaceSelection(`[${label}](https://)`);
  cm.focus();
}

function cmImage(){
  const cm = state.cm;
  const selection = cm.getSelection();
  const label = selection || "alt text";
  cm.replaceSelection(`![${label}](https://)`);
  cm.focus();
}

function cmTable(){
  const cm = state.cm;
  const cursor = cm.getCursor();
  const needsNewline = cm.getLine(cursor.line).length > 0;
  const snippet = (needsNewline ? "\n" : "") + "| Header | Header |\n| --- | --- |\n| Cell | Cell |\n";
  cm.replaceRange(snippet, cursor);
  cm.focus();
}

function cmHr(){
  const cm = state.cm;
  const cursor = cm.getCursor();
  const needsNewline = cm.getLine(cursor.line).length > 0;
  cm.replaceRange((needsNewline ? "\n" : "") + "---\n", cursor);
  cm.focus();
}

function openGuide(){
  window.open("https://www.markdownguide.org/basic-syntax/", "_blank", "noopener");
}

const TOOLBAR_ITEMS = [
  {icon:"bold", title:"Bold (**text**)", action: () => cmWrapSelection("**", "**")},
  {icon:"italic", title:"Italic (_text_)", action: () => cmWrapSelection("_", "_")},
  {icon:"heading", title:"Heading (cycles H1–H6)", action: cmToggleHeading},
  {sep:true},
  {icon:"quote", title:"Quote", action: () => cmToggleLinePrefix("> ")},
  {icon:"code", title:"Inline code", action: cmInlineCode},
  {icon:"codeblock", title:"Code block", action: cmCodeBlock},
  {icon:"ul", title:"Bulleted list", action: () => cmToggleLinePrefix("- ")},
  {icon:"ol", title:"Numbered list", action: cmOrderedList},
  {sep:true},
  {icon:"link", title:"Link", action: cmLink},
  {icon:"image", title:"Image", action: cmImage},
  {icon:"table", title:"Table", action: cmTable},
  {icon:"hr", title:"Horizontal rule", action: cmHr},
  {sep:true},
  {icon:"guide", title:"Markdown guide", action: openGuide},
];

function buildToolbar(){
  const bar = document.createElement("div");
  bar.className = "md-toolbar";
  for(const item of TOOLBAR_ITEMS){
    if(item.sep){
      const sep = document.createElement("span");
      sep.className = "tb-sep";
      bar.appendChild(sep);
      continue;
    }
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "tb-btn";
    btn.title = item.title;
    btn.innerHTML = TB_ICON[item.icon];
    btn.addEventListener("mousedown", (e) => e.preventDefault()); // keep CodeMirror focus/selection
    btn.addEventListener("click", () => item.action());
    bar.appendChild(btn);
  }
  return bar;
}

/* =========================================================
   Editor (CodeMirror 5)
   ========================================================= */
function initEditor(){
  const workspace = $("#workspace");
  workspace.innerHTML = `
    <div class="editor-shell" id="editorShell" style="display:none;">
      <input type="text" id="titleInput" class="title-input" placeholder="Untitled note" autocomplete="off">
      <div id="toolbarMount"></div>
      <div class="cm-wrap" id="cmMount"></div>
    </div>
    <div class="editor-footer" id="editorFooter" style="display:none;">
      <span class="fname" id="footerFilename"></span>
      <span id="footerCounts"></span>
    </div>
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="9" y1="13" x2="15" y2="13"></line>
        <line x1="9" y1="17" x2="13" y2="17"></line>
      </svg>
      <h2>No note open</h2>
      <p>Select a note from the sidebar, or start a new one. Everything saves instantly to this browser's local database — nothing is sent anywhere.</p>
    </div>
  `;

  // Toolbar sits above the CodeMirror canvas, inside the editor shell.
  $("#toolbarMount").replaceWith(buildToolbarWrapped());

  state.cm = CodeMirror($("#cmMount"), {
    value: "",
    mode: "markdown",
    theme: "default",
    lineNumbers: true,
    lineWrapping: true,
    styleActiveLine: true,
    placeholder: "Start writing — scope, endpoints, requests, payloads, findings...",
    viewportMargin: 50, // finite viewport so the DOM stays real (native scrolling, not infinite render)
    extraKeys: {
      "Tab": (cm) => cm.replaceSelection("  ", "end"),
    },
  });

  state.cm.on("change", () => {
    if(state.suppressChange) return;
    onEditorChange();
  });

  $("#titleInput").addEventListener("input", () => {
    if(state.suppressChange) return;
    onTitleInput();
  });
}

function buildToolbarWrapped(){
  const toolbar = buildToolbar();
  toolbar.id = "toolbarMount";
  return toolbar;
}

function onEditorChange(){
  const note = getCurrentNote();
  if(!note) return;
  note.content = state.cm.getValue();
  if(!note.titleLocked){
    const derivedTitle = extractTitle(note.content);
    note.title = derivedTitle;
    const ti = $("#titleInput");
    if(document.activeElement !== ti) ti.value = note.title === "Untitled" ? "" : note.title;
  }
  note.updatedAt = Date.now();
  markDirty(note);
  scheduleAutosave(note);
}

function onTitleInput(){
  const note = getCurrentNote();
  if(!note) return;
  const val = $("#titleInput").value;
  note.title = val.trim() ? val.trim() : "Untitled";
  note.titleLocked = true;
  note.updatedAt = Date.now();
  markDirty(note);
  scheduleAutosave(note);
}

function markDirty(note){
  note.dirty = true;
  renderNoteList();
  updateHeader();
  updateFooterCounts();
}

/* Debounced autosave straight to IndexedDB. A short delay coalesces
   fast keystrokes into a single write while still guaranteeing the
   note is safely on disk well before a refresh could lose it. */
function scheduleAutosave(note){
  clearTimeout(state.saveTimers[note.id]);
  setSyncPill("busy", "saving...");
  state.saveTimers[note.id] = setTimeout(() => persistNote(note), AUTOSAVE_DELAY);
}

async function persistNote(note){
  try{
    await dbPutNote(toDbRecord(note));
    note.dirty = false;
    restoreSyncPillIdle();
    renderNoteList();
    updateHeader();
  }catch(err){
    setSyncPill("error", "save failed");
    toast("Autosave failed: " + err.message, true);
  }
}

/* Dynamic breadcrumb / filename display — derived live from the note's
   current title rather than a fixed value, so it always reflects what's
   being typed instead of staying stuck on the original filename. */
function updateHeader(){
  const note = getCurrentNote();
  $("#headerNoteName").textContent = note ? displaySlugName(note) : "no note open";
  $("#dirtyDot").classList.toggle("show", !!(note && note.dirty));
  $("#saveBtn").disabled = false;
}

function updateFooterCounts(){
  const note = getCurrentNote();
  if(!note){ return; }
  const text = note.content || "";
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  $("#footerCounts").textContent = `${words} words · ${text.length} chars`;
  $("#footerFilename").textContent = `notes/${displaySlugName(note)}`;
}

/* =========================================================
   Note actions
   ========================================================= */
async function newNote(){
  const note = {
    id: uid(),
    title: "Untitled",
    titleLocked: false,
    content: "",
    dirty: true,
    updatedAt: Date.now(),
  };
  state.notes.unshift(note);
  renderNoteList();
  selectNote(note.id);
  $("#titleInput").focus();

  // Persist immediately so the note survives a refresh even before any typing.
  try{
    setSyncPill("busy", "saving...");
    await dbPutNote(toDbRecord(note));
    note.dirty = false;
    restoreSyncPillIdle();
    renderNoteList();
    updateHeader();
  }catch(err){
    setSyncPill("error", "save failed");
    toast("Could not create note: " + err.message, true);
  }
}

function selectNote(id){
  const note = state.notes.find(n => n.id === id);
  if(!note) return;

  state.currentId = id;
  state.suppressChange = true;
  state.cm.setValue(note.content || "");
  state.cm.clearHistory();
  $("#titleInput").value = note.title === "Untitled" ? "" : note.title;
  state.suppressChange = false;

  $("#emptyState").style.display = "none";
  $("#editorShell").style.display = "flex";
  $("#editorFooter").style.display = "flex";

  renderNoteList();
  updateHeader();
  updateFooterCounts();
  setTimeout(() => state.cm.refresh(), 0);
}

async function saveCurrentNote(){
  const note = getCurrentNote();
  if(!note){ toast("No note open"); return; }

  note.content = state.cm.getValue();
  const titleVal = $("#titleInput").value.trim();
  note.title = titleVal || extractTitle(note.content) || "Untitled";
  note.updatedAt = Date.now();

  clearTimeout(state.saveTimers[note.id]);

  try{
    setSyncPill("busy", "saving...");
    await dbPutNote(toDbRecord(note));
    note.dirty = false;
    renderNoteList();
    updateHeader();
    restoreSyncPillIdle();
    toast("Saved locally.");
  }catch(err){
    setSyncPill("error", "save failed");
    toast("Save failed: " + err.message, true);
  }
}

async function deleteNote(id){
  const note = state.notes.find(n => n.id === id);
  if(!note) return;
  const ok = confirm(`Delete "${note.title || "Untitled"}"? This cannot be undone.`);
  if(!ok) return;

  clearTimeout(state.saveTimers[id]);

  try{
    await dbDeleteNote(id);
  }catch(err){
    toast("Delete failed: " + err.message, true);
    return;
  }

  state.notes = state.notes.filter(n => n.id !== id);

  if(state.currentId === id){
    state.currentId = null;
    $("#editorShell").style.display = "none";
    $("#editorFooter").style.display = "none";
    $("#emptyState").style.display = "flex";
  }

  renderNoteList();
  toast("Note deleted");
}

/* =========================================================
   Per-note Markdown import / export (.md)
   ========================================================= */

/* Sanitise a note title into a safe, filesystem-friendly .md filename.
   Strips path separators and characters that are illegal on common
   operating systems, collapses whitespace, and guarantees a fallback. */
function sanitizeFilename(title){
  const base = (title || "Untitled note")
    .replace(/[\/\\:*?"<>|]/g, "-")   // illegal / path separators
    .replace(/[\u0000-\u001f]/g, "")  // control chars
    .replace(/\s+/g, " ")
    .trim()
    .replace(/^\.+/, "")              // no leading dots
    .slice(0, 120)
    .trim();
  return (base || "Untitled note") + ".md";
}

/* Normalise imported text: strip a UTF-8 BOM, unify line endings, and
   clip absurdly large payloads so the editor buffer stays responsive
   instead of freezing the tab. */
const MAX_IMPORT_CHARS = 2_000_000; // ~2M chars safety ceiling
function normalizeImportedText(raw){
  let text = String(raw == null ? "" : raw);
  if(text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // strip BOM
  text = text.replace(/\r\n?/g, "\n");                    // CRLF/CR -> LF
  let clipped = false;
  if(text.length > MAX_IMPORT_CHARS){
    text = text.slice(0, MAX_IMPORT_CHARS);
    clipped = true;
  }
  return {text, clipped};
}

/* Export ONLY the currently active note as a standalone .md download. */
function exportCurrentNote(){
  const note = getCurrentNote();
  if(!note){
    toast("No note open to export", true);
    return;
  }
  try{
    // Make sure the freshest editor buffer is captured, not a stale copy.
    const content = state.cm ? state.cm.getValue() : (note.content || "");
    const blob = new Blob([content], {type: "text/markdown;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = sanitizeFilename(note.title);
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    toast(`Exported "${a.download}"`);
  }catch(err){
    toast("Export failed: " + err.message, true);
  }
}

function triggerImport(){
  $("#importFileInput").click();
}

/* Read the chosen .md/.txt file via the native FileReader API, build a
   fresh note object, inject it into state + IndexedDB, select it, and
   re-render — all guarded so a parse failure never corrupts existing
   notes or freezes the screen. */
function handleImportFile(e){
  const input = e.target;
  const file = input.files && input.files[0];
  input.value = ""; // allow re-selecting the same file later
  if(!file) return;

  const reader = new FileReader();

  reader.onerror = () => {
    toast("Could not read that file: " + (reader.error ? reader.error.message : "unknown error"), true);
  };

  reader.onload = async () => {
    try{
      const {text, clipped} = normalizeImportedText(reader.result);

      // Derive the default title from the filename (drop the extension).
      const rawName = file.name || "Imported note";
      const baseTitle = rawName.replace(/\.(md|markdown|txt)$/i, "").trim() || "Imported note";

      const note = {
        id: uid(),
        title: baseTitle,
        titleLocked: true,
        content: text,
        dirty: false,
        updatedAt: Date.now(),
      };

      await dbPutNote(toDbRecord(note));
      state.notes.unshift(note);
      renderNoteList();
      selectNote(note.id);

      toast(clipped
        ? `Imported "${baseTitle}" (trimmed to ${MAX_IMPORT_CHARS.toLocaleString()} chars)`
        : `Imported "${baseTitle}"`);
    }catch(err){
      // Soft failure — existing notes and storage remain untouched.
      toast("Import failed: " + err.message, true);
    }
  };

  try{
    reader.readAsText(file);
  }catch(err){
    toast("Import failed: " + err.message, true);
  }
}


/* =========================================================
   Sidebar toggle
   ========================================================= */
function applySidebarState(){
  $("#sidebar").classList.toggle("collapsed", state.sidebarCollapsed);
}

function toggleSidebar(){
  state.sidebarCollapsed = !state.sidebarCollapsed;
  localStorage.setItem(LS_SIDEBAR, state.sidebarCollapsed ? "1" : "0");
  applySidebarState();
  setTimeout(() => { if(state.cm) state.cm.refresh(); }, 200);
}


/* =========================================================
   Wiring
   ========================================================= */
function wireEvents(){
  $("#sidebarToggle").addEventListener("click", toggleSidebar);
  $("#newNoteBtn").addEventListener("click", newNote);
  $("#saveBtn").addEventListener("click", saveCurrentNote);
  $("#exportNoteBtn").addEventListener("click", exportCurrentNote);
  $("#importNoteBtn").addEventListener("click", triggerImport);
  $("#importFileInput").addEventListener("change", handleImportFile);

  $("#searchInput").addEventListener("input", (e) => {
    state.filter = e.target.value;
    renderNoteList();
  });

  document.addEventListener("keydown", (e) => {
    const mod = e.ctrlKey || e.metaKey;
    if(mod && e.key.toLowerCase() === "s"){
      e.preventDefault();
      saveCurrentNote();
    }
  });

  window.addEventListener("resize", () => { if(state.cm) state.cm.refresh(); });

  window.addEventListener("beforeunload", (e) => {
    const anyDirty = state.notes.some(n => n.dirty);
    if(anyDirty){
      e.preventDefault();
      e.returnValue = "";
    }
  });
}

/* =========================================================
   Boot — load everything from IndexedDB and render immediately
   ========================================================= */
async function boot(){
  applySidebarState();
  initEditor();
  wireEvents();

  setSyncPill("busy", "loading...");
  try{
    const stored = await dbGetAllNotes();
    state.notes = stored.map(n => ({
      id: n.id,
      title: n.title || "Untitled",
      titleLocked: !!n.titleLocked,
      content: n.content || "",
      dirty: false,
      updatedAt: n.updatedAt || Date.now(),
    }));
    restoreSyncPillIdle();
  }catch(err){
    setSyncPill("error", "db unavailable");
    toast("Could not open local database: " + err.message, true);
  }

  renderNoteList();
}

boot();

})();
</script>
